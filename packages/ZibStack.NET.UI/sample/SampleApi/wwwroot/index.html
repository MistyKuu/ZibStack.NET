<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZibStack.NET Playground</title>
<style>
  :root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --accent: #3b82f6; --danger: #ef4444; --success: #22c55e; --code-bg: #0d1117; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { padding: .4rem .75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .75rem; flex-shrink: 0; }
  header h1 { font-size: 1rem; white-space: nowrap; } header h1 em { color: var(--accent); font-style: normal; }
  .sample-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: .3rem .5rem; border-radius: .25rem; font-size: .78rem; }
  .tabs { display: flex; gap: 0; flex-wrap: wrap; margin-left: auto; }
  .tab { padding: .35rem .6rem; font-size: .72rem; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
  .tab:hover { color: var(--text); } .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .count { background: var(--border); color: var(--text); font-size: .55rem; padding: 0 .25rem; border-radius: .15rem; margin-left: .15rem; }
  .status-bar { font-size: .68rem; color: var(--muted); white-space: nowrap; }
  .status-bar.error { color: var(--danger); } .status-bar.success { color: var(--success); }

  .main { display: flex; flex: 1; overflow: hidden; }
  .editor-pane { width: 42%; min-width: 300px; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .attr-bar { padding: .4rem .5rem; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-wrap: wrap; gap: .25rem .3rem; align-items: center; max-height: 7rem; overflow-y: auto; }
  .attr-bar .attr-group { display: inline-flex; gap: .2rem; align-items: center; }
  .attr-bar .attr-label { font-size: .6rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-right: .1rem; }
  .attr-tag { font-size: .65rem; padding: .1rem .35rem; border-radius: .15rem; cursor: pointer; border: 1px solid transparent; white-space: nowrap; }
  .attr-tag:hover { border-color: var(--accent); }
  .attr-tag.core { background: #1e3a5f; color: #93c5fd; } .attr-tag.dto { background: #3b1f4b; color: #d8b4fe; }
  .attr-tag.ui { background: #1a3c34; color: #86efac; } .attr-tag.validation { background: #422006; color: #fbbf24; }
  .attr-tooltip { position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: .35rem; padding: .5rem .65rem; font-size: .75rem; z-index: 200; max-width: 350px; pointer-events: none; box-shadow: 0 4px 12px rgba(0,0,0,.3); }
  .attr-tooltip .at-name { color: var(--accent); font-weight: 600; } .attr-tooltip .at-target { color: var(--muted); font-size: .65rem; }
  .attr-tooltip .at-desc { margin-top: .2rem; } .attr-tooltip .at-props { margin-top: .2rem; color: var(--muted); font-size: .7rem; font-family: monospace; }
  #editor { flex: 1; }
  .content-pane { flex: 1; overflow-y: auto; }
  .tab-content { display: none; padding: .75rem; } .tab-content.active { display: block; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: .5rem; padding: .75rem; margin-bottom: .75rem; }
  .panel h2 { font-size: .9rem; margin-bottom: .5rem; } .panel h3 { font-size: .8rem; color: var(--accent); margin: .5rem 0 .25rem; }

  .filters { display: flex; flex-wrap: wrap; gap: .4rem; align-items: end; margin-bottom: .5rem; }
  .filter-group { display: flex; flex-direction: column; gap: .1rem; }
  .filter-group label { font-size: .65rem; color: var(--muted); text-transform: uppercase; }
  .filter-group select, .filter-group input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: .3rem .4rem; border-radius: .25rem; font-size: .75rem; }
  .filter-group input { width: 100px; } .filter-group select { min-width: 55px; }
  button { background: var(--accent); color: #fff; border: none; padding: .35rem .7rem; border-radius: .25rem; cursor: pointer; font-size: .75rem; }
  button:hover { opacity: .9; } button.secondary { background: var(--border); } button.danger { background: var(--danger); } button.success { background: var(--success); color: #000; }
  table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  th, td { padding: .4rem .5rem; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; font-size: .7rem; text-transform: uppercase; cursor: default; white-space: nowrap; }
  th.sortable { cursor: pointer; } th.sortable:hover { color: var(--accent); }
  tr:hover td { background: rgba(59,130,246,.05); }
  .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: .5rem; font-size: .75rem; color: var(--muted); }
  .pagination button { font-size: .7rem; padding: .25rem .5rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
  .form-field { display: flex; flex-direction: column; gap: .15rem; } .form-field.full { grid-column: 1 / -1; }
  .form-field label { font-size: .7rem; color: var(--muted); }
  .form-field input, .form-field select, .form-field textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: .35rem .4rem; border-radius: .25rem; font-size: .8rem; }
  .form-field textarea { resize: vertical; } .form-field .error { color: var(--danger); font-size: .65rem; }
  .form-actions { grid-column: 1 / -1; display: flex; gap: .4rem; margin-top: .35rem; }
  .group-title { grid-column: 1 / -1; font-size: .75rem; color: var(--accent); font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: .2rem; margin-top: .2rem; }
  .toast { position: fixed; top: .75rem; right: .75rem; padding: .4rem .8rem; border-radius: .25rem; font-size: .8rem; z-index: 100; animation: fadeOut 3s forwards; }
  .toast.success { background: var(--success); color: #000; } .toast.error { background: var(--danger); color: #fff; }
  @keyframes fadeOut { 0%,70% { opacity: 1; } 100% { opacity: 0; } }
  .actions { display: flex; gap: .2rem; } .actions button { padding: .15rem .4rem; font-size: .65rem; }
  .empty { color: var(--muted); font-style: italic; text-align: center; padding: 1.5rem; }
  pre.code { background: var(--code-bg); border: 1px solid var(--border); border-radius: .3rem; padding: .6rem; font-size: .72rem; overflow: auto; max-height: 450px; white-space: pre; font-family: 'Cascadia Code','Fira Code',Consolas,monospace; line-height: 1.35; color: #c9d1d9; }
  .hl-kw { color: #ff7b72; } .hl-type { color: #79c0ff; } .hl-cmt { color: #8b949e; } .hl-attr { color: #d2a8ff; } .hl-str { color: #a5d6ff; }
  pre.json { background: var(--code-bg); border: 1px solid var(--border); border-radius: .3rem; padding: .6rem; font-size: .72rem; overflow: auto; max-height: 350px; white-space: pre-wrap; font-family: 'Cascadia Code',Consolas,monospace; color: #c9d1d9; }
  .file-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .2rem; }
  .file-header .filename { font-size: .72rem; color: var(--accent); font-family: monospace; } .file-header .lines { font-size: .6rem; color: var(--muted); }
</style>
</head>

'crud-dtos': `// Separate DTOs â€” full control over create/update/response shapes

[CrudApi(Route = "api/orders")]
[CreateDto]
[UpdateDto]
[ResponseDto]
[QueryDto(Sortable = true, DefaultSort = "OrderDate")]
public class Order
{
    [DtoIgnore] public int Id { get; set; }

    [ZRequired] [ZMaxLength(100)]
    public string CustomerName { get; set; } = "";

    [CreateOnly]  // only in create request
    public string OrderNumber { get; set; } = "";

    [Immutable]   // visible in update but not changeable
    public DateTime OrderDate { get; set; }

    [ZRange(0, 1000000)]
    public decimal TotalAmount { get; set; }

    [ResponseIgnore]  // exclude from response
    public string InternalNotes { get; set; } = "";

    [ListIgnore]  // exclude from list, include in get-by-id
    public string ShippingAddress { get; set; } = "";

    [QueryIgnore]  // exclude from filtering
    public byte[]? Signature { get; set; }
}`,

function loadSample(name) { if(editor && samples[name]) { editor.setValue(samples[name]); } }

// â”€â”€â”€ Tabs â”€â”€â”€
$('#tab-bar').addEventListener('click', e => { const t=e.target.closest('.tab'); if(!t) return; $$('.tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); $$('.tab-content').forEach(x=>x.classList.toggle('active',x.id==='tab-'+t.dataset.tab)); });

// â”€â”€â”€ Attributes â”€
async function loadAttributes() {
  try {
    allAttributes = await fetch('/api/playground/attributes').then(r=>r.json());
    const bar=$('#attr-bar'); const groups = {};
    allAttributes.forEach(a => { (groups[a.package]||(groups[a.package]=[])).push(a); });
    bar.innerHTML = Object.entries(groups).map(([pkg,attrs]) =>
      `<span class="attr-label">${pkg}</span>` +
      attrs.map(a => `<span class="attr-tag ${pkg.toLowerCase()}" data-attr="${a.name}">[${a.name}]</span>`).join('')
    ).join('<span style="margin:0 .3rem;color:var(--border)">|</span>');
  } catch(e) { $('#attr-bar').textContent = 'Failed to load attributes'; }
}

// Tooltip
document.addEventListener('mouseover', e => {
  const tag = e.target.closest('.attr-tag'); const tip=$('#tooltip');
  if(!tag) { tip.style.display='none'; return; }
  const name = tag.dataset.attr;
  const a = allAttributes.find(x=>x.name===name); if(!a) return;
  tip.innerHTML = `<span class="at-name">[${esc(a.name)}]</span> <span class="at-target">${esc(a.target)}</span><div class="at-desc">${esc(a.description)}</div>${a.props?`<div class="at-props">${esc(a.props)}</div>`:''}`;
  const r = tag.getBoundingClientRect();
  tip.style.display='block'; tip.style.left=r.left+'px'; tip.style.top=(r.bottom+4)+'px';
});
document.addEventListener('mouseout', e => { if(e.target.closest('.attr-tag')) $('#tooltip').style.display='none'; });

// Click attribute â†’ insert at cursor
document.addEventListener('click', e => {
  const tag = e.target.closest('.attr-tag'); if(!tag || !editor) return;
  const name = tag.dataset.attr;
  const a = allAttributes.find(x=>x.name===name); if(!a) return;
  const text = a.props ? `[${name}()]` : `[${name}]`;
  editor.trigger('keyboard','type',{text});
  editor.focus();
});

// â”€â”€â”€ Monaco â”€
require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } });
require(['vs/editor/editor.main'], function() {
  monaco.editor.defineTheme('zibstack',{base:'vs-dark',inherit:true,rules:[],colors:{'editor.background':'#1e293b'}});
  editor = monaco.editor.create($('#editor'),{value:samples.imtiredofcrud,language:'csharp',theme:'zibstack',fontSize:13,minimap:{enabled:false},scrollBeyondLastLine:false,automaticLayout:true,padding:{top:8}});
  editor.onDidChangeModelContent(()=>{clearTimeout(compileTimer);compileTimer=setTimeout(compile,600);});
  loadAttributes();
  compile();
});

// â”€â”€â”€ Compile â”€
async function compile() {
  const status=$('#status');status.className='status-bar';status.textContent='Compiling...';const start=performance.now();
  try {
    const res=await fetch('/api/playground',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:editor.getValue()})});
    const data=await res.json(); const ms=Math.round(performance.now()-start);
    if(data.error&&!data.formSchema&&!data.tableSchema){status.className='status-bar error';status.textContent=`Error (${ms}ms): ${data.error.substring(0,100)}`;return;}
    tableSchema=data.tableSchema?JSON.parse(data.tableSchema):null; formSchema=data.formSchema?JSON.parse(data.formSchema):null;
    if(tableSchema&&!tableSchema.apiUrl)tableSchema.apiUrl='/api/products'; if(formSchema&&!formSchema.apiUrl)formSchema.apiUrl='/api/products';
    const gf=data.generated||[],counts={};gf.forEach(f=>{counts[f.category]=(counts[f.category]||0)+1;});
    status.className='status-bar success';status.textContent=`${ms}ms | ${gf.length} files`;
    ['endpoints','dtos','query','database','ui'].forEach(t=>updateTabCount(t,counts[{endpoints:'Endpoints',dtos:'DTOs',query:'Query',database:'Database',ui:'UI'}[t]]));
    $('#schema-table').textContent=tableSchema?JSON.stringify(tableSchema,null,2):'No table schema';
    $('#schema-form').textContent=formSchema?JSON.stringify(formSchema,null,2):'No form schema';
    renderCodeTab('tab-endpoints',gf.filter(f=>f.category==='Endpoints'),'Endpoints');
    renderCodeTab('tab-dtos',gf.filter(f=>f.category==='DTOs'),'DTOs');
    renderCodeTab('tab-query',gf.filter(f=>f.category==='Query'),'Query DSL');
    renderCodeTab('tab-database',gf.filter(f=>f.category==='Database'),'Database');
    renderCodeTab('tab-ui',gf.filter(f=>f.category==='UI'),'UI Descriptors');
    currentSort=tableSchema?.defaultSort?.column||null;currentSortDesc=tableSchema?.defaultSort?.direction==='desc';
    currentPage=1;activeFilters={};editingId=null; renderTable();renderForm();loadData();
  } catch(ex){status.className='status-bar error';status.textContent=ex.message;}
}
function updateTabCount(n,c){const t=$(`.tab[data-tab="${n}"]`);if(!t)return;let b=t.querySelector('.count');if(c){if(!b){b=document.createElement('span');b.className='count';t.appendChild(b);}b.textContent=c;}else if(b)b.remove();}
function renderCodeTab(id,files,title){const el=$(`#${id}`);if(!files.length){el.innerHTML=`<div class="empty">No ${title} generated</div>`;return;}
  el.innerHTML=files.map(f=>{const l=f.source.split('\n').length;const n=f.fileName.replace('.g.cs','').replace(/^.*?_Models_/,'').replace(/^.*?_/,'');
  return`<div class="panel"><div class="file-header"><span class="filename">${esc(n)}</span><span class="lines">${l} lines</span></div><pre class="code">${hlCs(f.source)}</pre></div>`;}).join('');}
function hlCs(src){const tks=[];let i=0;function tk(c,t){const id=`\x00${i++}\x00`;tks.push({id,h:`<span class="hl-${c}">${t}</span>`});return id;}let s=esc(src);
  s=s.replace(/(&quot;(?:[^&]|&(?!quot;))*?&quot;)/g,m=>tk('str',m));s=s.replace(/(\/\/.*)/g,m=>tk('cmt',m));s=s.replace(/(\[[\w.]+(?:\(.*?\))?\])/g,m=>tk('attr',m));
  s=s.replace(/\b(public|private|static|partial|class|record|namespace|using|return|var|new|if|else|switch|case|async|await|readonly|override|virtual|sealed|int|string|bool|decimal|double|float|long|void|null|true|false|this|typeof|nameof|is|not|in|out)\b/g,m=>tk('kw',m));
  s=s.replace(/\b(IQueryable|Task|List|Dictionary|HashSet|CancellationToken|IEnumerable|ValueTask|IOrderedQueryable|PatchField|DtoValidationResult|ICanCreate|ICanApply|ICanValidate)\b/g,m=>tk('type',m));
  tks.forEach(t=>{s=s.replace(t.id,t.h);});return s;}

// â”€â”€â”€ Table â”€â”€
function renderTable(){if(!tableSchema){$('#table-panel').innerHTML='<div class="empty">No table schema</div>';return;}const cols=tableSchema.columns.filter(c=>c.visible!==false),p=$('#table-panel');
  p.innerHTML=`<h2>${esc(tableSchema.name)}</h2><div class="filters" id="filters"></div><table><thead><tr>${cols.map(c=>`<th class="${c.sortable?'sortable':''}" data-col="${c.name}">${esc(c.label||c.name)} ${c.sortable?'<span id="sort-'+c.name+'"></span>':''}</th>`).join('')}<th></th></tr></thead><tbody id="tbody"></tbody></table><div class="pagination"><span id="page-info"></span><div><button class="secondary" id="prev-btn" onclick="prevPage()">Prev</button> <button class="secondary" id="next-btn" onclick="nextPage()">Next</button></div></div>`;
  $$('th.sortable',p).forEach(th=>{th.onclick=()=>{const c=th.dataset.col;if(currentSort===c)currentSortDesc=!currentSortDesc;else{currentSort=c;currentSortDesc=false;}currentPage=1;loadData();};});
  const ct=$('#filters');if(!ct)return;const fc=cols.filter(c=>c.filterable);
  ct.innerHTML=fc.map(c=>`<div class="filter-group"><label>${esc(c.label||c.name)}</label><div style="display:flex;gap:.2rem"><select id="fop-${c.name}" style="width:55px">${(c.filterOperators||['=']).map(op=>`<option value="${op}" ${op==='=*'&&c.type==='string'?'selected':op==='='&&c.type!=='string'?'selected':''}>${opLbl(op)}</option>`).join('')}</select>${c.options?`<select id="fval-${c.name}"><option value="">All</option>${c.options.map(o=>`<option>${o}</option>`).join('')}</select>`:c.type==='boolean'?`<select id="fval-${c.name}"><option value="">All</option><option value="true">Yes</option><option value="false">No</option></select>`:`<input id="fval-${c.name}" placeholder="...">`}</div></div>`).join('')+`<div class="filter-group" style="align-self:end"><button onclick="applyFilters()">Go</button> <button class="secondary" onclick="clearFilters()">Clear</button></div>`;}
function opLbl(o){return{'=':'=','!=':'!=','<':'<','>':'>','<=':'<=','>=':'>=','=*':'~','!*':'!~','^':'A..','!^':'!A..','$':'..Z','!$':'!..Z','=in=':'in','=out=':'!in'}[o]||o;}
function applyFilters(){activeFilters={};tableSchema.columns.filter(c=>c.filterable&&c.visible!==false).forEach(c=>{const v=$(`#fval-${c.name}`)?.value?.trim(),op=$(`#fop-${c.name}`)?.value||'=';if(v)activeFilters[c.name]={op,val:v};});currentPage=1;loadData();}
function clearFilters(){activeFilters={};tableSchema.columns.filter(c=>c.filterable).forEach(c=>{const e=$(`#fval-${c.name}`);if(e)e.value='';});currentPage=1;loadData();}
async function loadData(){if(!tableSchema?.apiUrl)return;const p=new URLSearchParams();p.set('page',currentPage);p.set('pageSize',pageSize);const f=Object.entries(activeFilters).map(([k,{op,val}])=>`${k.charAt(0).toUpperCase()+k.slice(1)}${op}${val}`).join(',');if(f)p.set('filter',f);if(currentSort)p.set('sort',(currentSortDesc?'-':'')+currentSort.charAt(0).toUpperCase()+currentSort.slice(1));
  try{const d=await fetch(`${tableSchema.apiUrl}?${p}`).then(r=>r.json());const cols=tableSchema.columns.filter(c=>c.visible!==false);const key=tableSchema.keyProperty||'id';const tb=$('#tbody');if(!tb)return;
  tb.innerHTML=(d.items||[]).map(item=>`<tr>${cols.map(c=>`<td>${fmt(item[c.name],c)}</td>`).join('')}<td class="actions"><button onclick="editItem(${item[key]})">Edit</button> <button class="danger" onclick="deleteItem(${item[key]})">Del</button></td></tr>`).join('')||'<tr><td colspan="999" class="empty">No data</td></tr>';
  tableSchema.columns.filter(c=>c.sortable).forEach(c=>{const e=$(`#sort-${c.name}`);if(e)e.textContent=currentSort===c.name?(currentSortDesc?' â–Ľ':' â–˛'):'';});
  const tp=Math.ceil((d.totalCount||0)/pageSize)||1;const pi=$('#page-info');if(pi)pi.textContent=`${currentPage}/${tp} (${d.totalCount||0})`;
  const pb=$('#prev-btn');if(pb)pb.disabled=currentPage<=1;const nb=$('#next-btn');if(nb)nb.disabled=currentPage>=tp;}catch(e){}}
function fmt(v,c){if(v==null)return'<span style="color:var(--muted)">â€”</span>';if(c.type==='boolean')return v?'âś“':'âś—';if(c.format==='currency')return`$${Number(v).toFixed(2)}`;return String(v);}
function prevPage(){if(currentPage>1){currentPage--;loadData();}}function nextPage(){currentPage++;loadData();}

// â”€â”€â”€ Form â”€â”€
function renderForm(){if(!formSchema){$('#form-panel').innerHTML='<div class="empty">No form schema</div>';return;}const p=$('#form-panel');
  let h=`<h2 id="form-title">Create ${esc(formSchema.name)}</h2><form id="crud-form" class="form-grid" onsubmit="submitForm(event)">`;
  const gs=(formSchema.groups||[]).sort((a,b)=>a.order-b.order),fs=formSchema.fields||[];
  if(gs.length){gs.forEach(g=>{h+=`<div class="group-title">${esc(g.label||g.name)}</div>`;fs.filter(f=>f.group===g.name).sort((a,b)=>a.order-b.order).forEach(f=>{h+=rF(f);});});fs.filter(f=>!f.group).forEach(f=>{h+=rF(f);});}
  else fs.sort((a,b)=>a.order-b.order).forEach(f=>{h+=rF(f);});
  h+=`<div class="form-actions"><button type="submit" class="success" id="submit-btn">Create</button><button type="button" class="secondary" onclick="resetForm()">Cancel</button></div></form>`;p.innerHTML=h;}
function rF(f){if(f.hidden)return`<input type="hidden" name="${f.name}" id="field-${f.name}">`;const fl=f.uiHint==='textarea'?' full':'';let i;
  if(f.uiHint==='select'&&f.options)i=`<select name="${f.name}" id="field-${f.name}">${f.options.map(o=>`<option value="${o.value}">${o.label}</option>`).join('')}</select>`;
  else if(f.uiHint==='checkbox'){i=`<label style="display:flex;align-items:center;gap:.4rem"><input type="checkbox" name="${f.name}" id="field-${f.name}"> ${esc(f.label||f.name)}</label>`;return`<div class="form-field${fl}">${i}<div class="error" id="err-${f.name}"></div></div>`;}
  else if(f.uiHint==='textarea')i=`<textarea name="${f.name}" id="field-${f.name}" rows="${f.props?.rows||3}" placeholder="${esc(f.placeholder||'')}"></textarea>`;
  else if(f.uiHint==='slider')i=`<input type="range" name="${f.name}" id="field-${f.name}" min="${f.props?.min??0}" max="${f.props?.max??100}" step="${f.props?.step??1}">`;
  else{const t=f.type==='integer'||f.type==='decimal'?'number':'text';const s=f.type==='decimal'?' step="0.01"':'';i=`<input type="${t}" name="${f.name}" id="field-${f.name}" placeholder="${esc(f.placeholder||'')}"${s} ${f.validation?.minLength?`minlength="${f.validation.minLength}"`:''} ${f.validation?.maxLength?`maxlength="${f.validation.maxLength}"`:''} ${f.validation?.min!=null?`min="${f.validation.min}"`:''} ${f.validation?.max!=null?`max="${f.validation.max}"`:''} ${f.required?'required':''}>`;}
  return`<div class="form-field${fl}"><label for="field-${f.name}">${esc(f.label||f.name)}${f.required?' *':''}</label>${i}<div class="error" id="err-${f.name}"></div></div>`;}
async function submitForm(e){e.preventDefault();if(!formSchema?.apiUrl)return;if(demoMode){toast('Demo mode â€” CRUD is read-only','error');return;}const body={};(formSchema.fields||[]).forEach(f=>{const el=$(`#field-${f.name}`);if(!el)return;if(f.uiHint==='checkbox')body[f.name]=el.checked;else if(f.type==='integer')body[f.name]=el.value?parseInt(el.value):0;else if(f.type==='decimal')body[f.name]=el.value?parseFloat(el.value):0;else body[f.name]=el.value||null;});
  (formSchema.fields||[]).forEach(f=>{const e=$(`#err-${f.name}`);if(e)e.textContent='';});
  try{const isE=editingId!=null;const res=await fetch(isE?`${formSchema.apiUrl}/${editingId}`:formSchema.apiUrl,{method:isE?'PATCH':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(res.ok){toast(isE?'Updated':'Created','success');resetForm();loadData();}else if(res.status===400){const err=await res.json();if(err.errors)Object.entries(err.errors).forEach(([k,m])=>{const e=$(`#err-${k.charAt(0).toLowerCase()+k.slice(1)}`);if(e)e.textContent=Array.isArray(m)?m.join(', '):m;});else toast('Validation failed','error');}else toast(`Error ${res.status}`,'error');}catch(ex){toast(ex.message,'error');}}
async function editItem(id){if(!formSchema?.apiUrl)return;const r=await fetch(`${formSchema.apiUrl}/${id}`);if(!r.ok)return;const item=await r.json();editingId=id;const ft=$('#form-title');if(ft)ft.textContent=`Edit #${id}`;const sb=$('#submit-btn');if(sb)sb.textContent='Update';(formSchema.fields||[]).forEach(f=>{const el=$(`#field-${f.name}`);if(!el)return;if(f.uiHint==='checkbox')el.checked=!!item[f.name];else el.value=item[f.name]??'';});$('#form-panel').scrollIntoView({behavior:'smooth'});}
function resetForm(){editingId=null;const ft=$('#form-title');if(ft)ft.textContent=`Create ${formSchema?.name||''}`;const sb=$('#submit-btn');if(sb)sb.textContent='Create';const form=$('#crud-form');if(form)form.reset();(formSchema?.fields||[]).forEach(f=>{const e=$(`#err-${f.name}`);if(e)e.textContent='';});}
async function deleteItem(id){if(demoMode){toast('Demo mode â€” CRUD is read-only','error');return;}if(!formSchema?.apiUrl||!confirm('Delete?'))return;const r=await fetch(`${formSchema.apiUrl}/${id}`,{method:'DELETE'});if(r.ok){toast('Deleted','success');loadData();}else toast('Failed','error');}
function toast(m,t){const e=document.createElement('div');e.className=`toast ${t}`;e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),3e3);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
