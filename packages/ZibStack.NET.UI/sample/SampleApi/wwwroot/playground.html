<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZibStack.NET Playground</title>
<style>
  :root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --accent: #3b82f6; --danger: #ef4444; --success: #22c55e; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { padding: .75rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  header h1 { font-size: 1.1rem; }
  header h1 span { color: var(--accent); }
  .toolbar { display: flex; gap: .5rem; align-items: center; }
  button { background: var(--accent); color: #fff; border: none; padding: .4rem .8rem; border-radius: .25rem; cursor: pointer; font-size: .8rem; }
  button:hover { opacity: .9; }
  button:disabled { opacity: .5; cursor: default; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .editor-pane { width: 45%; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .preview-pane { flex: 1; overflow-y: auto; padding: 1rem; }
  #editor { flex: 1; }
  .status { padding: .3rem .75rem; font-size: .75rem; color: var(--muted); border-top: 1px solid var(--border); flex-shrink: 0; display: flex; justify-content: space-between; }
  .status.error { color: var(--danger); }
  .status.success { color: var(--success); }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: .5rem; padding: 1rem; margin-bottom: 1rem; }
  .panel h2 { font-size: .9rem; margin-bottom: .75rem; color: var(--accent); }
  table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  th, td { padding: .4rem .5rem; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; font-size: .7rem; text-transform: uppercase; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
  .form-field { display: flex; flex-direction: column; gap: .15rem; }
  .form-field.full { grid-column: 1 / -1; }
  .form-field label { font-size: .7rem; color: var(--muted); }
  .form-field input, .form-field select, .form-field textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: .3rem .4rem; border-radius: .25rem; font-size: .8rem; }
  .form-field textarea { resize: vertical; }
  .group-title { grid-column: 1 / -1; font-size: .75rem; color: var(--accent); font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: .2rem; margin-top: .25rem; }
  .badge { display: inline-block; background: var(--border); color: var(--text); padding: .1rem .4rem; border-radius: .15rem; font-size: .65rem; margin: .1rem; }
  .badge.sort { background: #1d4ed8; }
  .badge.filter { background: #7c3aed; }
  .empty { color: var(--muted); font-style: italic; text-align: center; padding: 2rem; }
  .col-meta { display: flex; gap: .25rem; flex-wrap: wrap; margin-top: .15rem; }
</style>
</head>
<body>

<header>
  <h1><span>ZibStack.NET</span> Playground</h1>
  <div class="toolbar">
    <button id="run-btn" onclick="compile()">Run (Ctrl+Enter)</button>
    <span id="timer" style="font-size:.75rem;color:var(--muted)"></span>
  </div>
</header>

<div class="main">
  <div class="editor-pane">
    <div id="editor"></div>
    <div class="status" id="status">Ready — write a model with [ImTiredOfCrud] and press Run</div>
  </div>
  <div class="preview-pane" id="preview">
    <div class="empty">Press Run to compile your model and see the generated UI</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script>
const defaultCode = `[ImTiredOfCrud(DefaultSort = "Name")]
[UiFormGroup("basic", Label = "Basic Info", Order = 1)]
[UiFormGroup("details", Label = "Details", Order = 2)]
public partial class Product
{
    [UiFormIgnore]
    [UiTableColumn(IsVisible = false)]
    public int Id { get; set; }

    [Required] [MaxLength(200)]
    [UiFormField(Label = "Product Name", Placeholder = "Enter name...", Group = "basic")]
    [UiTableColumn(Sortable = true, Filterable = true)]
    public string Name { get; set; } = "";

    [MaxLength(500)]
    [UiFormField(Label = "Description", Group = "basic")]
    [TextArea(Rows = 3)]
    [UiTableColumn(Filterable = true)]
    public string? Description { get; set; }

    [Range(0, 999999)]
    [UiFormField(Label = "Price", Group = "details")]
    [UiTableColumn(Sortable = true, Filterable = true, Format = "currency")]
    public decimal Price { get; set; }

    [Range(0, 10000)]
    [UiFormField(Label = "Stock", Group = "details")]
    [UiTableColumn(Sortable = true, Filterable = true)]
    public int Stock { get; set; }

    [UiFormField(Label = "Active")]
    [Checkbox]
    [UiTableColumn(Sortable = true, Filterable = true)]
    public bool IsActive { get; set; } = true;
}`;

let editor;

require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } });
require(['vs/editor/editor.main'], function () {
  monaco.editor.defineTheme('zibstack', {
    base: 'vs-dark',
    inherit: true,
    rules: [],
    colors: { 'editor.background': '#1e293b' }
  });

  editor = monaco.editor.create(document.getElementById('editor'), {
    value: defaultCode,
    language: 'csharp',
    theme: 'zibstack',
    fontSize: 13,
    minimap: { enabled: false },
    lineNumbers: 'on',
    scrollBeyondLastLine: false,
    automaticLayout: true,
    padding: { top: 10 },
  });

  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, compile);
});

async function compile() {
  const btn = document.getElementById('run-btn');
  const status = document.getElementById('status');
  const timer = document.getElementById('timer');
  btn.disabled = true;
  status.className = 'status';
  status.textContent = 'Compiling...';
  timer.textContent = '';

  const start = performance.now();

  try {
    const res = await fetch('/api/playground', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: editor.getValue() })
    });
    const data = await res.json();
    const ms = Math.round(performance.now() - start);
    timer.textContent = `${ms}ms`;

    if (data.error && !data.formSchema && !data.tableSchema) {
      status.className = 'status error';
      status.textContent = data.error;
      document.getElementById('preview').innerHTML = `<div class="empty" style="color:var(--danger)">${escHtml(data.error)}</div>`;
    } else {
      status.className = 'status success';
      status.textContent = 'Compiled successfully';
      renderPreview(
        data.formSchema ? JSON.parse(data.formSchema) : null,
        data.tableSchema ? JSON.parse(data.tableSchema) : null
      );
    }
  } catch (ex) {
    status.className = 'status error';
    status.textContent = ex.message;
  } finally {
    btn.disabled = false;
  }
}

function renderPreview(form, table) {
  const preview = document.getElementById('preview');
  let html = '';

  if (table) {
    html += `<div class="panel"><h2>Table Schema — ${escHtml(table.name)}</h2>`;
    if (table.apiUrl) html += `<div style="font-size:.75rem;color:var(--muted);margin-bottom:.5rem">API: <code>${escHtml(table.apiUrl)}</code> | Key: <code>${escHtml(table.keyProperty || '?')}</code></div>`;

    const cols = (table.columns || []).filter(c => c.visible !== false);
    html += `<table><thead><tr><th>Column</th><th>Type</th><th>Features</th><th>Filter Operators</th></tr></thead><tbody>`;
    cols.forEach(c => {
      const badges = [];
      if (c.sortable) badges.push('<span class="badge sort">sortable</span>');
      if (c.filterable) badges.push('<span class="badge filter">filterable</span>');
      if (c.format) badges.push(`<span class="badge">${escHtml(c.format)}</span>`);
      if (c.computed) badges.push('<span class="badge">computed</span>');

      const ops = (c.filterOperators || []).map(o => `<code style="font-size:.7rem">${escHtml(o)}</code>`).join(' ');
      html += `<tr><td><strong>${escHtml(c.label || c.name)}</strong><br><span style="font-size:.7rem;color:var(--muted)">${escHtml(c.name)}</span></td>
        <td>${escHtml(c.type)}${c.options ? '<br><span style="font-size:.7rem">' + c.options.join(', ') + '</span>' : ''}</td>
        <td>${badges.join('') || '—'}</td>
        <td>${ops || '—'}</td></tr>`;
    });
    html += '</tbody></table>';

    if (table.pagination) html += `<div style="font-size:.75rem;color:var(--muted);margin-top:.5rem">Pagination: ${table.pagination.defaultPageSize} per page | Sizes: ${table.pagination.pageSizes?.join(', ')}</div>`;
    if (table.defaultSort) html += `<div style="font-size:.75rem;color:var(--muted)">Default sort: ${table.defaultSort.column} ${table.defaultSort.direction}</div>`;
    html += '</div>';
  }

  if (form) {
    html += `<div class="panel"><h2>Form Schema — ${escHtml(form.name)}</h2>`;
    if (form.apiUrl) html += `<div style="font-size:.75rem;color:var(--muted);margin-bottom:.5rem">Submit to: <code>POST ${escHtml(form.apiUrl)}</code> | Update: <code>PATCH ${escHtml(form.apiUrl)}/{${escHtml(form.keyProperty || 'id')}}</code></div>`;

    html += '<div class="form-grid">';
    const groups = (form.groups || []).sort((a, b) => a.order - b.order);
    const fields = form.fields || [];

    if (groups.length) {
      groups.forEach(g => {
        html += `<div class="group-title">${escHtml(g.label || g.name)}</div>`;
        fields.filter(f => f.group === g.name).sort((a, b) => a.order - b.order).forEach(f => {
          html += renderFormField(f);
        });
      });
      const ungrouped = fields.filter(f => !f.group);
      ungrouped.forEach(f => { html += renderFormField(f); });
    } else {
      fields.sort((a, b) => a.order - b.order).forEach(f => { html += renderFormField(f); });
    }
    html += '</div></div>';
  }

  if (!html) html = '<div class="empty">No form or table schema generated. Make sure your class has [ImTiredOfCrud], [UiForm], or [UiTable].</div>';
  preview.innerHTML = html;
}

function renderFormField(f) {
  if (f.hidden) return '';
  const fullClass = f.uiHint === 'textarea' ? ' full' : '';
  let input;

  if (f.uiHint === 'select' && f.options) {
    input = `<select disabled>${f.options.map(o => `<option>${o.label}</option>`).join('')}</select>`;
  } else if (f.uiHint === 'checkbox') {
    input = `<label style="display:flex;align-items:center;gap:.5rem"><input type="checkbox" disabled> ${escHtml(f.label || f.name)}</label>`;
    return `<div class="form-field${fullClass}">${input}</div>`;
  } else if (f.uiHint === 'textarea') {
    input = `<textarea rows="${f.props?.rows || 3}" placeholder="${escHtml(f.placeholder || '')}" disabled></textarea>`;
  } else if (f.uiHint === 'slider') {
    input = `<input type="range" min="${f.props?.min ?? 0}" max="${f.props?.max ?? 100}" disabled>`;
  } else {
    const type = f.type === 'integer' || f.type === 'decimal' ? 'number' : 'text';
    input = `<input type="${type}" placeholder="${escHtml(f.placeholder || '')}" disabled>`;
  }

  const req = f.required ? ' *' : '';
  const validation = [];
  if (f.validation) {
    if (f.validation.minLength) validation.push(`min: ${f.validation.minLength}`);
    if (f.validation.maxLength) validation.push(`max: ${f.validation.maxLength}`);
    if (f.validation.min != null) validation.push(`≥ ${f.validation.min}`);
    if (f.validation.max != null) validation.push(`≤ ${f.validation.max}`);
    if (f.validation.pattern) validation.push(`pattern`);
    if (f.validation.email) validation.push(`email`);
  }
  const valStr = validation.length ? `<span style="font-size:.65rem;color:var(--muted)">${validation.join(' | ')}</span>` : '';

  return `<div class="form-field${fullClass}">
    <label>${escHtml(f.label || f.name)}${req} <span style="color:var(--border);font-size:.65rem">${escHtml(f.uiHint)}</span></label>
    ${input}
    ${valStr}
  </div>`;
}

function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
