name: Release ZibStack.NET.Aop

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.0, 1.2.3-beta.1)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build ZibStack.NET.slnx -c Release

      - name: Pack Abstractions
        run: dotnet pack packages/ZibStack.NET.Aop/src/ZibStack.NET.Aop.Abstractions/ZibStack.NET.Aop.Abstractions.csproj -c Release -o ./artifacts -p:PackageVersion=${{ inputs.version }}

      # Bundles ZibStack.NET.Aop.dll (generator) +
      #         ZibStack.NET.Aop.Analyzers.dll (15 AOP00xx diagnostics) +
      #         ZibStack.NET.Aop.CodeFixes.dll (9 Roslyn code fixes)
      # All three ride along under analyzers/dotnet/cs in a single .nupkg.
      - name: Pack Generator (with Analyzers + CodeFixes bundled)
        run: dotnet pack packages/ZibStack.NET.Aop/src/ZibStack.NET.Aop/ZibStack.NET.Aop.csproj -c Release -o ./artifacts -p:PackageVersion=${{ inputs.version }}

      - name: Pack Polly
        run: dotnet pack packages/ZibStack.NET.Aop/src/ZibStack.NET.Aop.Polly/ZibStack.NET.Aop.Polly.csproj -c Release -o ./artifacts -p:PackageVersion=${{ inputs.version }}

      - name: Pack HybridCache
        run: dotnet pack packages/ZibStack.NET.Aop/src/ZibStack.NET.Aop.HybridCache/ZibStack.NET.Aop.HybridCache.csproj -c Release -o ./artifacts -p:PackageVersion=${{ inputs.version }}

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: aop-v${{ inputs.version }}
          name: ZibStack.NET.Aop v${{ inputs.version }}
          generate_release_notes: true
          files: ./artifacts/*.nupkg
