name: Release ZibStack.NET.EntityFramework

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.0, 1.2.3-beta.1)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build ZibStack.NET.slnx -c Release

      - name: Pack
        run: dotnet pack packages/ZibStack.NET.EntityFramework/src/ZibStack.NET.EntityFramework/ZibStack.NET.EntityFramework.csproj -c Release -o ./artifacts -p:PackageVersion=${{ inputs.version }}

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: entityframework-v${{ inputs.version }}
          name: ZibStack.NET.EntityFramework v${{ inputs.version }}
          generate_release_notes: true
          files: ./artifacts/*.nupkg
